<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>페이지를 찾을 수 없음 : 라운지</title>
    <style>
      /* Reset & Base */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family:
          'Pretendard Variable',
          Pretendard,
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          Roboto,
          'Helvetica Neue',
          'Segoe UI',
          'Apple SD Gothic Neo',
          'Noto Sans KR',
          'Malgun Gothic',
          'Apple Color Emoji',
          'Segoe UI Emoji',
          'Segoe UI Symbol',
          sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: #fff;
        color: #000;
        line-height: 1.5;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
      }

      /* Error Page Layout */
      .error-wrap {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        flex: 1;
        padding: 36px 20px;
        text-align: center;
      }

      .error-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 360px;
      }

      /* Illustration */
      .illustration {
        width: 80px;
        height: 80px;
        margin-bottom: 0;
      }

      .illustration img {
        width: 100%;
        height: 100%;
      }

      /* Title */
      .title {
        margin-top: 16px;
        padding: 0 12px;
        font-size: 24px;
        font-weight: 600;
        line-height: 1.333;
        letter-spacing: -0.3px;
        color: #000;
      }

      /* Description */
      .description {
        margin-top: 12px;
        padding: 0 12px;
        font-size: 15px;
        font-weight: 400;
        line-height: 1.6;
        letter-spacing: -0.3px;
        color: #737373;
      }

      /* Button Area */
      .button-area {
        display: flex;
        gap: 10px;
        width: 100%;
        margin-top: 32px;
        padding: 0 36px;
      }

      .button {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1;
        height: 52px;
        padding: 16px 24px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        line-height: 1.3125;
        letter-spacing: -0.3px;
        transition: opacity 0.2s ease;
      }

      .button:hover {
        opacity: 0.8;
      }

      .button:active {
        opacity: 0.6;
      }

      .button.secondary {
        background-color: #f5f8fb;
        color: #000;
      }

      .button.primary {
        background-color: #000;
        color: #fff;
      }

      /* Responsive - Large screens */
      @media screen and (min-width: 768px) {
        .error-wrap {
          padding: 48px 24px;
        }

        .button-area {
          padding: 0;
        }
      }

      /* Safe area for mobile browsers */
      @supports (padding-bottom: env(safe-area-inset-bottom)) {
        body {
          padding-bottom: env(safe-area-inset-bottom);
        }
      }
    </style>
  </head>
  <body>
    <main class="error-wrap">
      <div class="error-content">
        <!-- Alert Illustration -->
        <div class="illustration">
          <img src="https://ssl.pstatic.net/static/lounge/icon/graphic/160x160/alert.png" alt="알림 아이콘" width="80" height="80" />
        </div>

        <!-- Title -->
        <h1 class="title">찾을 수 없는 페이지입니다.</h1>

        <!-- Description -->
        <p class="description">
          페이지가 삭제되었거나 주소가 변경되었을 수 있습니다.<br />
          주소가 정확하게 입력되었는지 확인하시기 바랍니다.
        </p>

        <!-- Button Area -->
        <div class="button-area">
          <button type="button" class="button secondary" onclick="goBack()">이전</button>
          <a href="https://lounge.naver.com" class="button primary">라운지 홈</a>
        </div>
      </div>
    </main>

    <script>
      function goBack() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.close();
        }
      }
    </script>
  </body>
</html>
